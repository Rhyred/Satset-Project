<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SatSet SuperApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-nav { color: #2563eb; font-weight: 600; }
        .inactive-nav { color: #6b7280; }
    </style>
</head>
<body class="bg-gray-50 pb-16 md:pb-0 flex flex-col md:flex-row min-h-screen">

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 z-50 md:relative md:w-64 md:border-r md:border-t-0 md:h-screen md:flex md:flex-col">
        <div class="hidden md:flex items-center justify-center h-16 border-b px-4">
            <span class="text-xl font-bold text-blue-600">SatSet</span>
        </div>
        <div class="flex justify-around items-center h-16 md:flex-col md:h-full md:justify-start md:mt-4 md:gap-2">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full text-xs gap-1 md:flex-row md:justify-start md:px-6 md:py-3 md:h-auto md:text-sm transition-colors hover:text-blue-500"
               th:classappend="${#httpServletRequest.requestURI == '/' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
               <span class="md:ml-3">Home</span>
            </a>
            <a href="/reports" class="flex flex-col items-center justify-center w-full h-full text-xs gap-1 md:flex-row md:justify-start md:px-6 md:py-3 md:h-auto md:text-sm transition-colors hover:text-blue-500"
               th:classappend="${#httpServletRequest.requestURI == '/reports' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
               <span class="md:ml-3">Laporan & Feed</span>
            </a>
            <a href="/account" class="flex flex-col items-center justify-center w-full h-full text-xs gap-1 md:flex-row md:justify-start md:px-6 md:py-3 md:h-auto md:text-sm transition-colors hover:text-blue-500"
               th:classappend="${#httpServletRequest.requestURI == '/account' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
               <span class="md:ml-3">Akun</span>
            </a>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-6 overflow-x-hidden" layout:fragment="content">
        <!-- Content will go here -->
    </main>

</body>
</html>
