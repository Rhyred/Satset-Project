<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>SatSet - Pengaduan & Feed</title>
</head>
<body>
<div layout:fragment="header-title">Pengaduan Warga</div>
<div layout:fragment="content" class="max-w-4xl mx-auto pb-10" 
    x-data="{ 
        activeTab: 'community', 
        showModal: false,
        laporans: [],
        newReport: { judulLaporan: '', deskripsi: '', kategoriId: 2, userId: 1 },
        loading: false,
        init() {
            this.fetchLaporan();
        },
        async fetchLaporan() {
            try {
                let res = await fetch('/api/laporan');
                let data = await res.json();
                this.laporans = data.sort((a,b) => b.id - a.id);
            } catch(e) {}
        },
        async submitReport() {
            if(!this.newReport.judulLaporan || !this.newReport.deskripsi) return;
            this.loading = true;
            try {
                let res = await fetch('/api/laporan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.newReport)
                });
                if(res.ok) {
                    this.showModal = false;
                    this.newReport.judulLaporan = '';
                    this.newReport.deskripsi = '';
                    await this.fetchLaporan();
                    this.activeTab = 'mine';
                }
            } finally {
                this.loading = false;
            }
        },
        get myLaporans() {
            return this.laporans.filter(l => l.userId === 1);
        },
        formatDate(dateStr) {
            if(!dateStr) return '';
            return new Date(dateStr).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    }">
    
    <!-- Header & Tabs -->
    <div class="mb-6 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Laporan & Pengaduan</h2>
            <p class="text-sm text-slate-500 mt-1">Sampaikan keluhan fasilitas publik atau pantau aduan di sekitar Anda.</p>
        </div>
        <button @click="showModal = true" class="bg-primary hover:bg-blue-800 text-white text-sm font-semibold py-2.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Buat Laporan Baru
        </button>
    </div>

    <!-- Tab Navigation -->
    <div class="border-b border-slate-200 mb-6">
        <nav class="flex space-x-6" aria-label="Tabs">
            <button @click="activeTab = 'mine'" 
                    :class="activeTab === 'mine' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'"
                    class="whitespace-nowrap py-3 border-b-2 font-medium text-sm transition-colors">
                Laporan Saya
            </button>
            <button @click="activeTab = 'community'" 
                    :class="activeTab === 'community' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'"
                    class="whitespace-nowrap py-3 border-b-2 font-medium text-sm transition-colors flex items-center gap-2">
                Community Feed
            </button>
        </nav>
    </div>

    <!-- Tab Content: Laporan Saya -->
    <div x-show="activeTab === 'mine'" x-transition.opacity class="space-y-4">
        
        <div x-show="myLaporans.length === 0" class="text-center py-16 bg-white rounded-3xl border border-dashed border-slate-300">
            <div class="w-16 h-16 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
            </div>
            <h3 class="font-bold text-slate-700 mb-1">Belum ada laporan</h3>
            <p class="text-slate-500 text-sm max-w-sm mx-auto mb-4">Anda belum mengajukan laporan pengaduan apapun.</p>
        </div>

        <template x-for="laporan in myLaporans" :key="laporan.id">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">Anda</div>
                        <div>
                            <p class="font-semibold text-slate-800 text-sm">Laporan #<span x-text="laporan.id"></span></p>
                            <p class="text-xs text-slate-500" x-text="formatDate(laporan.createdAt)"></p>
                        </div>
                    </div>
                    <div class="px-2.5 py-1 bg-amber-50 text-amber-600 border border-amber-100 rounded-lg text-xs font-medium" x-text="laporan.statusLaporan"></div>
                </div>
                <h4 class="font-bold text-slate-800 mb-1" x-text="laporan.judulLaporan"></h4>
                <p class="text-sm text-slate-600 mb-3 leading-relaxed" x-text="laporan.deskripsi"></p>
            </div>
        </template>
    </div>

    <!-- Tab Content: Community Feed -->
    <div x-show="activeTab === 'community'" x-cloak x-transition.opacity class="space-y-4">
        
        <template x-for="laporan in laporans" :key="laporan.id">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-200 rounded-full"></div>
                        <div>
                            <p class="font-semibold text-slate-800 text-sm">Warga #<span x-text="laporan.userId"></span></p>
                            <p class="text-xs text-slate-500" x-text="formatDate(laporan.createdAt)"></p>
                        </div>
                    </div>
                    <div class="px-2.5 py-1 rounded-lg text-xs font-medium"
                         :class="laporan.statusLaporan === 'SELESAI' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-amber-50 text-amber-600 border border-amber-100'"
                         x-text="laporan.statusLaporan"></div>
                </div>
                <h4 class="font-bold text-slate-800 mb-1" x-text="laporan.judulLaporan"></h4>
                <p class="text-sm text-slate-600 mb-3 leading-relaxed" x-text="laporan.deskripsi"></p>
            </div>
        </template>
        
        <div x-show="laporans.length === 0" class="text-center py-12 text-slate-500">
            Belum ada laporan dari warga.
        </div>
    </div>

    <!-- Create Report Modal -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="showModal" x-transition.opacity class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity" @click="showModal = false" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div x-show="showModal" 
                 x-transition:enter="ease-out duration-300" 
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" 
                 x-transition:leave="ease-in duration-200" 
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" 
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
                 class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 border-b border-slate-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl leading-6 font-bold text-slate-900" id="modal-title">Buat Laporan Baru</h3>
                        <button @click="showModal = false" class="text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-full p-1.5 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    
                    <form class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Judul Laporan</label>
                            <input type="text" x-model="newReport.judulLaporan" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" placeholder="Misal: Jalan berlubang di depan pasar">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Deskripsi Detail</label>
                            <textarea rows="4" x-model="newReport.deskripsi" class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all resize-none" placeholder="Ceritakan detail masalah, lokasi akurat, dan kondisi saat ini..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="bg-slate-50 px-4 py-4 sm:px-6 sm:flex sm:flex-row-reverse border-t border-slate-100">
                    <button type="button" @click="submitReport" :disabled="loading" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-2 bg-primary text-base font-semibold text-white hover:bg-blue-800 sm:ml-3 sm:w-auto sm:text-sm transition-colors disabled:opacity-50">
                        Kirim Laporan
                    </button>
                    <button type="button" @click="showModal = false" class="mt-3 w-full inline-flex justify-center rounded-xl border border-slate-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-slate-700 hover:bg-slate-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
