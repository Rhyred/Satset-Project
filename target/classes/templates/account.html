<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>SatSet - Profil Akun</title>
</head>
<body>
<div layout:fragment="header-title">Profil Warga</div>
<div layout:fragment="content" class="max-w-3xl mx-auto space-y-6 pb-10"
    x-data="{
        user: { namaLengkap: 'Warga Teladan', nik: '3273010101010001', email: 'warga@satset.id' },
        antreans: [],
        laporans: [],
        init() {
            this.fetchData();
        },
        async fetchData() {
            try {
                let [resA, resL] = await Promise.all([
                    fetch('/api/antrean'),
                    fetch('/api/laporan')
                ]);
                let allAntrean = await resA.json();
                let allLaporan = await resL.json();
                this.antreans = allAntrean.filter(a => a.userId === 1);
                this.laporans = allLaporan.filter(l => l.userId === 1);
            } catch(e) {}
        },
        formatDate(dateStr) {
            if(!dateStr) return '';
            return new Date(dateStr).toLocaleDateString('id-ID');
        }
    }">
    
    <!-- Profile Header -->
    <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="h-32 bg-gradient-to-r from-primary to-blue-400"></div>
        <div class="px-6 sm:px-10 pb-8 relative">
            <div class="w-24 h-24 bg-white rounded-full p-1.5 absolute -top-12 border border-slate-100 shadow-md">
                <div class="w-full h-full bg-slate-100 rounded-full flex items-center justify-center text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
            
            <div class="mt-14 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800" x-text="user.namaLengkap"></h1>
                    <p class="text-slate-500 font-medium" x-text="'NIK: ' + user.nik"></p>
                </div>
                <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 border border-emerald-100 text-emerald-600 rounded-lg font-medium text-sm w-fit">
                    Akun Terverifikasi
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <h3 class="font-bold text-slate-800 mb-4 pb-3 border-b border-slate-100">Data Pribadi</h3>
                <div class="space-y-4">
                    <div>
                        <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Email</p>
                        <p class="text-sm text-slate-700 font-medium" x-text="user.email"></p>
                    </div>
                </div>
                <button class="mt-6 w-full py-2 px-4 bg-slate-50 hover:bg-slate-100 text-slate-600 text-sm font-semibold rounded-xl border border-slate-200 transition-colors">
                    Edit Profil
                </button>
            </div>
        </div>

        <div class="md:col-span-2 space-y-4">
            <h3 class="font-bold text-slate-800 text-lg">Riwayat Aktivitas</h3>
            
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="divide-y divide-slate-100">
                    
                    <template x-for="antrean in antreans" :key="'A'+antrean.id">
                        <div class="p-5 flex gap-4 hover:bg-slate-50 transition-colors">
                            <div class="shrink-0 w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">A</div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="font-semibold text-slate-800">Antrean <span x-text="antrean.nomorAntrian"></span></h4>
                                    <span class="text-[10px] font-medium text-slate-400" x-text="formatDate(antrean.createdAt)"></span>
                                </div>
                                <p class="text-sm text-slate-600 mb-2" x-text="antrean.jenisSurat"></p>
                                <div class="inline-flex items-center px-2 py-1 rounded-md bg-amber-50 text-amber-600 text-xs font-medium border border-amber-100" x-text="antrean.statusAntrian"></div>
                            </div>
                        </div>
                    </template>
                    
                    <template x-for="laporan in laporans" :key="'L'+laporan.id">
                        <div class="p-5 flex gap-4 hover:bg-slate-50 transition-colors">
                            <div class="shrink-0 w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center">L</div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="font-semibold text-slate-800" x-text="laporan.judulLaporan"></h4>
                                    <span class="text-[10px] font-medium text-slate-400" x-text="formatDate(laporan.createdAt)"></span>
                                </div>
                                <p class="text-sm text-slate-600 mb-2 line-clamp-1" x-text="laporan.deskripsi"></p>
                                <div class="inline-flex items-center px-2 py-1 rounded-md bg-emerald-50 text-emerald-600 text-xs font-medium border border-emerald-100" x-text="laporan.statusLaporan"></div>
                            </div>
                        </div>
                    </template>
                    
                    <div x-show="antreans.length === 0 && laporans.length === 0" class="p-8 text-center text-slate-500">
                        Belum ada riwayat aktivitas.
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
