<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>SatSet - Akun</title>
</head>
<body>
<div layout:fragment="content" class="space-y-6 max-w-lg mx-auto">
    <header class="text-center space-y-2 mt-8 mb-6">
        <div class="mx-auto w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-gray-900">Warga Teladan</h1>
        <p class="text-sm text-gray-500 font-mono">3273010101010001</p>
    </header>

    <div class="space-y-4">
        <div class="bg-white border rounded-xl shadow-sm overflow-hidden">
            <div class="bg-gray-50 border-b px-4 py-3 flex items-center text-sm font-semibold text-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 text-blue-500"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
                Informasi Pribadi
            </div>
            <div class="p-4 space-y-3">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-500">Email</span>
                    <span class="font-medium text-gray-900">warga@satset.id</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-gray-500">Tipe Akun</span>
                    <span class="font-medium text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">Terverifikasi</span>
                </div>
            </div>
        </div>
    </div>

    <div class="pt-4 flex flex-col gap-3">
        <button class="w-full text-left px-4 py-2 border rounded-lg text-red-600 border-red-200 bg-red-50 hover:bg-red-100 flex items-center font-medium transition">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            Keluar Akun
        </button>
    </div>
</div>
</body>
</html>
