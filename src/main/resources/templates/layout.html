<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">SatSet SuperApp</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#1e40af', secondary: '#10b981' }
                }
            }
        }
    </script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .active-nav { color: #1e40af !important; font-weight: 600; background-color: #eff6ff; border-right: 4px solid #1e40af; }
        @media (max-width: 768px) { .active-nav { border-right: none; border-bottom: 3px solid #1e40af; background-color: transparent; } }
        .inactive-nav { color: #64748b; }
        .inactive-nav:hover { color: #1e40af; background-color: #f8fafc; }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-16 md:pb-0 flex flex-col md:flex-row min-h-screen antialiased">

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 z-50 md:relative md:w-64 md:border-r md:border-t-0 md:h-screen md:flex md:flex-col md:shrink-0 shadow-sm md:shadow-none">
        <div class="hidden md:flex items-center justify-center h-20 border-b border-slate-100 px-4">
            <div class="flex items-center gap-2 text-primary font-bold text-2xl tracking-tight">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
                </svg>
                SatSet
            </div>
        </div>
        <div class="flex justify-around items-center h-16 md:flex-col md:h-full md:justify-start md:pt-6 md:gap-1">
            <a href="/" class="flex flex-col items-center justify-center w-full h-full text-[10px] gap-1 md:flex-row md:justify-start md:px-6 md:py-3.5 md:h-auto md:text-sm transition-all duration-200"
               th:classappend="${#httpServletRequest.requestURI == '/' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
               <span class="md:ml-3 font-medium">Beranda</span>
            </a>
            <a href="/queue" class="flex flex-col items-center justify-center w-full h-full text-[10px] gap-1 md:flex-row md:justify-start md:px-6 md:py-3.5 md:h-auto md:text-sm transition-all duration-200"
               th:classappend="${#httpServletRequest.requestURI == '/queue' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M9 14h6"></path><path d="M9 10h6"></path><path d="M9 18h6"></path></svg>
               <span class="md:ml-3 font-medium">Antrean</span>
            </a>
            <a href="/reports" class="flex flex-col items-center justify-center w-full h-full text-[10px] gap-1 md:flex-row md:justify-start md:px-6 md:py-3.5 md:h-auto md:text-sm transition-all duration-200"
               th:classappend="${#httpServletRequest.requestURI == '/reports' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
               <span class="md:ml-3 font-medium">Pengaduan</span>
            </a>
            <a href="/mading" class="flex flex-col items-center justify-center w-full h-full text-[10px] gap-1 md:flex-row md:justify-start md:px-6 md:py-3.5 md:h-auto md:text-sm transition-all duration-200"
               th:classappend="${#httpServletRequest.requestURI == '/mading' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
               <span class="md:ml-3 font-medium">Mading</span>
            </a>
            <a href="/account" class="flex flex-col items-center justify-center w-full h-full text-[10px] gap-1 md:flex-row md:justify-start md:px-6 md:py-3.5 md:h-auto md:text-sm transition-all duration-200"
               th:classappend="${#httpServletRequest.requestURI == '/account' ? 'active-nav' : 'inactive-nav'}">
               <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
               <span class="md:ml-3 font-medium">Profil</span>
            </a>
        </div>
    </nav>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-30 hidden md:block">
            <div class="px-6 py-4 flex items-center justify-between">
                <h1 class="text-xl font-bold text-slate-800" layout:fragment="header-title">Beranda</h1>
                <div class="flex items-center gap-4">
                    <button class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                    </button>
                    <div class="h-8 w-8 bg-primary/10 rounded-full flex items-center justify-center text-primary font-bold">
                        W
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 w-full p-4 md:p-6 lg:p-8 overflow-y-auto" layout:fragment="content">
            <!-- Content will go here -->
        </main>
    </div>

</body>
</html>
