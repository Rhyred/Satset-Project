<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>SatSet - Mading Digital</title>
</head>
<body>
<div layout:fragment="header-title">Mading Digital</div>
<div layout:fragment="content" class="max-w-3xl mx-auto space-y-6 pb-10"
    x-data="{
        madings: [],
        filter: 'SEMUA',
        init() {
            this.fetchMading();
        },
        async fetchMading() {
            try {
                let res = await fetch('/api/mading/all');
                this.madings = await res.json();
            } catch(e) { console.error(e); }
        },
        get filteredMadings() {
            if(this.filter === 'SEMUA') return this.madings;
            return this.madings.filter(m => m.jenisInformasi === this.filter);
        },
        formatDate(dateStr) {
            if(!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    }">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Informasi Publik</h2>
            <p class="text-sm text-slate-500 mt-1">Pemberitahuan, pengumuman, dan berita terbaru dari admin.</p>
        </div>
        
        <div class="bg-white rounded-xl border border-slate-200 p-1 flex shadow-sm">
            <button @click="filter = 'SEMUA'" :class="filter === 'SEMUA' ? 'bg-primary text-white shadow-sm' : 'text-slate-600 hover:text-slate-800'" class="px-4 py-1.5 text-sm font-semibold rounded-lg transition-colors">Semua</button>
            <button @click="filter = 'PENTING'" :class="filter === 'PENTING' ? 'bg-primary text-white shadow-sm' : 'text-slate-600 hover:text-slate-800'" class="px-4 py-1.5 text-sm font-semibold rounded-lg transition-colors">Penting</button>
            <button @click="filter = 'INFO WARGA'" :class="filter === 'INFO WARGA' ? 'bg-primary text-white shadow-sm' : 'text-slate-600 hover:text-slate-800'" class="px-4 py-1.5 text-sm font-semibold rounded-lg transition-colors">Info Warga</button>
        </div>
    </div>

    <!-- Mading Items -->
    <div class="space-y-4">
        
        <template x-for="mading in filteredMadings" :key="mading.id">
            <article class="bg-white rounded-2xl border shadow-sm overflow-hidden relative"
                     :class="mading.jenisInformasi === 'PENTING' ? 'border-red-200' : 'border-slate-200'">
                <div x-show="mading.jenisInformasi === 'PENTING'" class="absolute top-0 left-0 w-1.5 h-full bg-red-500"></div>
                <div class="p-6">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-bold border"
                              :class="mading.jenisInformasi === 'PENTING' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-100'">
                            <span x-text="mading.jenisInformasi"></span>
                        </span>
                        <span class="text-xs text-slate-400 font-medium">Diunggah pada <span x-text="formatDate(mading.createdAt)"></span></span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2" x-text="mading.judul"></h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-4 whitespace-pre-wrap" x-text="mading.konten"></p>
                </div>
            </article>
        </template>
        
        <div x-show="filteredMadings.length === 0" class="text-center py-12 text-slate-500">
            Tidak ada informasi pada kategori ini.
        </div>

    </div>
</div>
</body>
</html>
