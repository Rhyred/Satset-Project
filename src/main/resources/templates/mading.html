<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>SatSet - Mading Digital</title>
    <style>
        .mading-container {
            max-width: 48rem;
            margin: 0 auto;
            margin-top: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .mading-header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 640px) {
            .mading-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
            }
        }

        .mading-title h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.015em;
        }

        .mading-subtitle {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 0.25rem;
        }

        .filter-group {
            background: white;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            padding: 0.25rem;
            display: flex;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .filter-button {
            padding: 0.375rem 1rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background-color: transparent;
            color: #475569;
        }

        .filter-button:hover {
            color: #1e293b;
        }

        .filter-button.active {
            background-color: #1e40af;
            color: white;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .mading-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mading-card {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
            transition: all 0.2s;
        }

        .mading-card.penting::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0.375rem;
            height: 100%;
            background-color: #ef4444;
        }

        .mading-card.penting {
            border-color: #fecaca;
        }

        .mading-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .mading-content {
            padding: 1.5rem;
        }

        .mading-card.penting .mading-content {
            padding-left: 1.75rem;
        }

        .mading-header-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .mading-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid;
        }

        .badge-penting {
            background-color: #fee2e2;
            color: #dc2626;
            border-color: #fecaca;
        }

        .badge-info {
            background-color: #dbeafe;
            color: #2563eb;
            border-color: #bfdbfe;
        }

        .mading-date {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .mading-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .mading-body {
            font-size: 0.875rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #64748b;
            background: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(1rem);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mading-card {
            animation: slideInUp 0.4s ease-out;
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<div layout:fragment="header-title">Mading Digital</div>
<div layout:fragment="content" class="mading-container"
    x-data="{
        madings: [],
        filter: 'SEMUA',
        init() {
            this.fetchMading();
        },
        async fetchMading() {
            try {
                let res = await fetch('/api/mading/all');
                this.madings = await res.json();
            } catch(e) {
                console.error('Error fetching madings:', e);
            }
        },
        get filteredMadings() {
            if(this.filter === 'SEMUA') return this.madings;
            return this.madings.filter(m => m.jenisInformasi === this.filter);
        },
        formatDate(dateStr) {
            if(!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    }">

    <!-- Header -->
    <div class="mading-header">
        <div class="mading-title">
            <h2>Informasi Publik</h2>
            <p class="mading-subtitle">Pemberitahuan, pengumuman, dan berita terbaru dari admin.</p>
        </div>

        <div class="filter-group">
            <button @click="filter = 'SEMUA'" class="filter-button" :class="filter === 'SEMUA' ? 'active' : ''">Semua</button>
            <button @click="filter = 'PENTING'" class="filter-button" :class="filter === 'PENTING' ? 'active' : ''">Penting</button>
            <button @click="filter = 'INFO WARGA'" class="filter-button" :class="filter === 'INFO WARGA' ? 'active' : ''">Info Warga</button>
        </div>
    </div>

    <!-- Mading Items -->
    <div class="mading-list" x-show="filteredMadings.length > 0">
        <template x-for="mading in filteredMadings" :key="mading.id">
            <article class="mading-card" :class="mading.jenisInformasi === 'PENTING' ? 'penting' : ''">
                <div class="mading-content">
                    <div class="mading-header-meta">
                        <span class="mading-badge" :class="mading.jenisInformasi === 'PENTING' ? 'badge-penting' : 'badge-info'">
                            <span x-text="mading.jenisInformasi"></span>
                        </span>
                        <span class="mading-date">Diunggah pada <span x-text="formatDate(mading.createdAt)"></span></span>
                    </div>
                    <h3 class="mading-title" x-text="mading.judul"></h3>
                    <p class="mading-body" x-text="mading.konten"></p>
                </div>
            </article>
        </template>
    </div>

    <!-- Empty State -->
    <div x-show="filteredMadings.length === 0" class="empty-state">
        Tidak ada informasi pada kategori ini.
    </div>

</div>
</body>
</html>
